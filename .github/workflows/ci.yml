name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Use `npm install` rather than `npm ci`: the project is developed on
      # Windows and CI runs on Linux, so the lockfile's platform-specific
      # optional binaries (rollup/esbuild/emnapi) differ and `npm ci` rejects
      # them. `npm install` resolves the correct binaries for the runner.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
