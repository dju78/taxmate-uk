name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # npm ci uses package-lock.json directly. The lockfile (v3) includes all
      # platform-specific optional packages with os/cpu constraints so npm
      # resolves and skips the Windows-only binaries automatically on Linux.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Run lifecycle scripts that were skipped above (Vite/Tailwind/esbuild
      # post-install hooks are pure-JS shims; no platform binaries needed for
      # them — Vite picks the correct native binary at build time via optionality).
      - name: Run post-install scripts
        run: npm rebuild

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
